name: Bug report
description: Report something that is not working as expected
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ParaCalc369.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected result
      placeholder: What did you expect to happen?
  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: Chrome on Windows, Safari on iPhone, etc.
  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: Screenshots, console output, or extra context.
